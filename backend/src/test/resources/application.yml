server:
  port: 0

spring:
  application:
    name: renthub-backend-test
  datasource:
    url: jdbc:h2:mem:renthub_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Dialect auto-detected by Spring Boot 3.4.x — no explicit value needed for H2
  flyway:
    enabled: false

jwt:
  secret: 9a4f2c8d3b7a1e6f45c8a0b3f2e7d1c6e5f4a8b9c0d1e2f3a4b5c6d7e8f9a0b1
  expiration: 86400000
  refresh-expiration: 604800000
